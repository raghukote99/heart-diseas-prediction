<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Admin Login – AK Health Prediction</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
    :root {
        --primary-red: #d63031;
    }

    body {
        margin: 0;
        font-family: "Poppins", sans-serif;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;

        /* 🔥 BACKGROUND IMAGE */
        background: url("/static/images/login_bg.jpg") no-repeat center/cover fixed;
        backdrop-filter: blur(4px);
    }

    /* Dark overlay for depth */
    body::before {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(3px);
    }

    /* Glass login card */
    .login-box {
        position: relative;
        width: 420px;
        padding: 24px 34px 34px;
        border-radius: 18px;
        backdrop-filter: blur(14px);
        background: rgba(255, 255, 255, 0.12);
        border: 1px solid rgba(255, 255, 255, 0.25);
        box-shadow: 0 0 35px rgba(0,0,0,0.4);
        color: white;
        text-align: center;
        z-index: 10;
        animation: fadeUp 1s ease forwards;
        transform: translateY(40px);
        opacity: 0;
    }

    @keyframes fadeUp {
        0% { opacity: 0; transform: translateY(40px); }
        100% { opacity: 1; transform: translateY(0); }
    }

    /* 🔥 AK Health Prediction – sliding, glowing title */
    .brand-title {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 0.12em;
        margin-bottom: 4px;
        color: var(--primary-red);
        text-transform: uppercase;
        opacity: 0;
        white-space: nowrap;
        overflow: hidden;
        display: inline-block;
        position: relative;

        /* 1) type + slide once, 2) glow + shimmer loop (stays visible) */
        animation:
            brandTyping4 2.4s steps(24, end) forwards,
            brandGlow4 4s ease-in-out 2.4s infinite,
            brandShimmer4 7s linear 2.4s infinite;
    }

    /* one-time typing + slide */
    @keyframes brandTyping4 {
        0% {
            opacity: 0;
            width: 0ch;
            transform: translateX(-150px);
        }
        20% {
            opacity: 1;
            width: 0ch;
        }
        100% {
            opacity: 1;
            width: 20ch;           /* adjust if you change the text length */
            transform: translateX(0);
        }
    }

    /* looping neon glow */
    @keyframes brandGlow4 {
        0% {
            text-shadow: 0 0 4px rgba(214,48,49,0.4);
            filter: brightness(1);
        }
        50% {
            text-shadow: 0 0 16px rgba(255,80,80,0.95);
            filter: brightness(1.15);
        }
        100% {
            text-shadow: 0 0 6px rgba(214,48,49,0.6);
            filter: brightness(1.03);
        }
    }

    /* subtle shimmer wiggle */
    @keyframes brandShimmer4 {
        0%   { letter-spacing: 0.12em; transform: translateY(0); }
        25%  { letter-spacing: 0.15em; transform: translateY(-1px); }
        50%  { letter-spacing: 0.12em; transform: translateY(0); }
        75%  { letter-spacing: 0.14em; transform: translateY(1px); }
        100% { letter-spacing: 0.12em; transform: translateY(0); }
    }

    /* small underline under brand title */
    .brand-title::after {
        content: "";
        position: absolute;
        left: 0;
        bottom: -4px;
        height: 2px;
        width: 0%;
        border-radius: 999px;
        background: linear-gradient(
            90deg,
            rgba(255, 200, 200, 0.1),
            rgba(214, 48, 49, 1),
            rgba(255, 220, 220, 0.5)
        );
        animation:
            underlineGrow4 1.6s ease-out 2.1s forwards,
            underlineBreath4 3.4s ease-in-out 3.7s infinite;
    }

    @keyframes underlineGrow4 {
        0%   { width: 0%; }
        60%  { width: 110%; }
        100% { width: 80%; }
    }

    @keyframes underlineBreath4 {
        0%   { transform: scaleX(1); opacity: 0.85; }
        50%  { transform: scaleX(1.08); opacity: 1; }
        100% { transform: scaleX(1); opacity: 0.85; }
    }

    h2 {
        font-size: 24px;
        font-weight: 600;
        margin-top: 18px;
        margin-bottom: 12px;
    }

    input {
        width: 100%;
        padding: 12px;
        margin-top: 12px;
        border-radius: 8px;
        outline: none;
        border: none;
        background: rgba(255,255,255,0.9);
        font-size: 15px;
    }

    button {
        width: 100%;
        background: #1a1a1a;
        color: white;
        padding: 12px;
        border-radius: 8px;
        border: none;
        margin-top: 18px;
        font-size: 17px;
        cursor: pointer;
        font-weight: 600;
        transition: 0.25s;
    }

    button:hover {
        background: #e63946;
        letter-spacing: 1px;
        transform: scale(1.03);
    }

    a {
        color: #e8e8ff;
        text-decoration: none;
        font-size: 14px;
    }

    a:hover {
        color: #ff698a;
    }

    .footer-links {
        margin-top: 14px;
    }
</style>
</head>

<body>

<div class="login-box">
    <!-- 🔥 Sliding brand text -->
    <div class="brand-title">AK HEALTH PREDICTION</div>

    <h2>Admin Login</h2>

    <form method="POST" action="{{ url_for('login') }}">
        <input type="text" name="username" placeholder="Enter Username" required>
        <input type="password" name="password" placeholder="Enter Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="footer-links">
        <a href="{{ url_for('register') }}">New here? Register</a><br>
        <a href="{{ url_for('home') }}">Back to Home</a>
    </div>
</div>

</body>
</html>
