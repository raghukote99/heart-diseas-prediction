<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Start Call - AK Health</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body style="background:#f3f4f6;">
    <div class="container" style="padding:2rem;">
        <div class="card">
            <div class="card-body">
                <h3>Join Consultation</h3>
                <p>Appointment with <strong>{{ doctor_name }}</strong> on <strong>{{ date }}</strong> at <strong>{{ time }}</strong></p>
                <div style="margin-top:1rem;">
                    {% if teleconsult_link %}
                        <div style="position:relative;padding-top:56.25%;">
                            <iframe src="{{ teleconsult_link }}" allow="camera; microphone; autoplay; display-capture" style="position:absolute;top:0;left:0;width:100%;height:100%;border:0;" allowfullscreen></iframe>
                        </div>
                    {% else %}
                        <div class="alert alert-warning">No meeting link available yet. Please wait or contact the clinic.</div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</body>
</html>
